{{ if .Site.Params.commentarioUrl }}
<link rel="stylesheet" href="{{ .Site.Params.commentarioUrl }}/commentario.css">
<div id="commentario"></div>
<script src="{{ .Site.Params.commentarioUrl }}/commentario.js"></script>
<script>
  new Commentario({
    apiUrl: '{{ .Site.Params.commentarioUrl }}',
    pageSlug: window.location.pathname,
    containerId: 'commentario'
  });
</script>
{{ end }}
